<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Faire Pair · Valider les compétences, ensemble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231D9E75'/%3E%3Cpolygon points='16,5 27,16 16,27 5,16' fill='none' stroke='white' stroke-width='2.2' stroke-linejoin='round'/%3E%3Ccircle cx='16' cy='16' r='2.8' fill='white'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #F4F0E8;
      --bg2: #EDE8DD;
      --wh: #FDFAF5;
      --tx: #1A1714;
      --mu: #6B6560;
      --bd: rgba(26, 23, 20, 0.12);
      --bs: rgba(26, 23, 20, 0.22);
      --tl: #0A5E47;
      --tm: #1D9E75;
      --tll: #DFF3EC;
      --am: #B8720F;
      --aml: #FDF2DC;
      --pu: #4A41A8;
      --pul: #EEEDFE;
      --re: #C0392B;
      --rel: #FDECEA;
      --r: 10px;
      --rl: 16px;
      --sh: 0 1px 3px rgba(26, 23, 20, .08), 0 4px 16px rgba(26, 23, 20, .05);
      --dbar: 38px;
    }

    html {
      /* Bloque le pull-to-refresh natif iOS dans les SPA */
      overscroll-behavior-y: none;
      height: 100%
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--tx);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding-top: var(--dbar);
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 300;
      line-height: 1.2
    }

    h1 {
      font-size: clamp(26px, 5vw, 50px)
    }

    h2 {
      font-size: clamp(19px, 3.5vw, 32px)
    }

    h3 {
      font-size: 18px
    }

    h4 {
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif
    }

    p {
      color: var(--mu)
    }

    button,
    input,
    select,
    textarea {
      font-family: 'DM Sans', sans-serif
    }

    button {
      cursor: pointer;
      border: none;
      outline: none
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--bs);
      border-radius: var(--r);
      background: var(--wh);
      color: var(--tx);
      font-size: 14px;
      outline: none;
      transition: border-color .15s
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--tl)
    }

    textarea {
      resize: vertical;
      min-height: 88px
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--tx);
      margin-bottom: 4px
    }

    /* ── DEMO BAR ── */
    #demo-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 400;
      height: var(--dbar);
      background: #1A1714;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, .5);
    }

    .demo-roles {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0
    }

    .demo-deleg {
      display: flex;
      align-items: center
    }

    #demo-bar span {
      color: rgba(255, 255, 255, .4);
      margin-right: 4px
    }

    .db-btn {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 11px;
      border-radius: 20px;
      background: rgba(255, 255, 255, .08);
      color: rgba(255, 255, 255, .7);
      border: 1px solid rgba(255, 255, 255, .12);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .db-btn:hover {
      background: rgba(255, 255, 255, .15);
      color: #fff
    }

    .db-btn.on {
      background: var(--tl);
      color: #fff;
      border-color: var(--tl)
    }

    /* ── NAV ── */
    .nav {
      position: sticky;
      top: var(--dbar);
      z-index: 200;
      background: rgba(244, 240, 232, .93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      overflow: visible;
      flex-wrap: nowrap;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex-shrink: 0
    }

    /* ══ LOGO IMAGE — remplace logo.png par ton fichier ══ */
    #logo-img {
      height: 28px;
      width: auto;
      display: block
    }

    #logo-txt {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 20px;
      letter-spacing: -.3px
    }

    #logo-txt span {
      color: var(--tl)
    }

    .nav-links {
      display: flex;
      gap: 3px
    }

    .nb {
      font-size: 13px;
      font-weight: 500;
      padding: 6px 13px;
      border-radius: 20px;
      color: var(--mu);
      background: none;
      border: none;
      transition: all .15s
    }

    .nb:hover {
      color: var(--tx);
      background: rgba(26, 23, 20, .06)
    }

    .nb.on {
      background: var(--tl);
      color: #fff
    }

    .nav-r {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-width: 0
    }

    .av-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--tl);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0
    }

    /* Hamburger — masqué par défaut, affiché par media query */
    #ham-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      flex-shrink: 0;
    }

    #ham-btn span {
      display: block;
      height: 2px;
      background: var(--tx);
      border-radius: 2px;
      transition: all .25s
    }

    #mob-menu {
      display: none
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      min-height: calc(100vh - 60px - var(--dbar))
    }

    .screen.active {
      display: block
    }

    /* ── BUTTONS ── */
    .bp {
      background: var(--tl);
      color: #fff;
      padding: 11px 22px;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background .15s
    }

    .bp:hover {
      background: #0A4D3A
    }

    .bo {
      background: transparent;
      color: var(--tx);
      padding: 11px 22px;
      border-radius: var(--r);
      border: 1.5px solid var(--bs);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s
    }

    .bo:hover {
      background: var(--bg2)
    }

    .bsm {
      padding: 7px 14px !important;
      font-size: 13px !important;
      border-radius: 20px !important
    }

    .bfull {
      width: 100%;
      display: block;
      text-align: center
    }

    /* ── CARDS / BADGES ── */
    .card {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 22px;
      box-shadow: var(--sh)
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px
    }

    .bp2 {
      background: var(--pul);
      color: var(--pu)
    }

    .bt {
      background: var(--tll);
      color: var(--tl)
    }

    .ba {
      background: var(--aml);
      color: var(--am)
    }

    .bg {
      background: #E6F4E6;
      color: #1E6B1E
    }

    .bgr {
      background: var(--bg2);
      color: var(--mu)
    }

    .br {
      background: var(--rel);
      color: var(--re)
    }

    .chip {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--mu);
      border: 1px solid var(--bd);
      display: inline-block
    }

    .chipv {
      background: var(--tll);
      color: var(--tl);
      border-color: rgba(10, 94, 71, .15)
    }

    .fg {
      margin-bottom: 15px
    }

    .fr {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .ferr {
      font-size: 12px;
      color: var(--re);
      margin-top: 3px;
      min-height: 15px
    }

    /* ── MODAL ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 23, 20, .45);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem
    }

    .overlay.open {
      display: flex
    }

    .modal {
      background: var(--wh);
      border-radius: var(--rl);
      width: 100%;
      max-width: 450px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(26, 23, 20, .25)
    }

    .mhd {
      padding: 22px 25px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between
    }

    .mcl {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg2);
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: var(--mu)
    }

    .mbody {
      padding: 17px 25px 25px
    }

    .role-g {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 17px
    }

    .rc {
      border: 2px solid var(--bd);
      border-radius: var(--rl);
      padding: 14px;
      cursor: pointer;
      transition: all .15s;
      text-align: center
    }

    .rc:hover,
    .rc.sel {
      border-color: var(--tl);
      background: var(--tll)
    }

    .demobox {
      background: var(--aml);
      border: 1px solid rgba(184, 114, 15, .2);
      border-radius: var(--r);
      padding: 11px 13px;
      margin-bottom: 14px
    }

    .demobox h5 {
      font-size: 12px;
      font-weight: 500;
      color: var(--am);
      margin-bottom: 5px
    }

    .demobox p {
      font-size: 12px;
      color: var(--tx);
      margin-bottom: 3px
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      color: #fff;
      padding: 12px 17px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 500;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      max-width: 290px;
      background: var(--tx)
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    .toast.ok {
      background: var(--tl)
    }

    .toast.err {
      background: var(--re)
    }

    /* ── HERO / LANDING ── */
    .hero-wrap {
      position: relative;
      overflow: hidden
    }

    #parallax-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0
    }

    .hero {
      max-width: 1060px;
      margin: 0 auto;
      padding: 70px 2rem 56px;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 3.5rem;
      align-items: center;
      position: relative;
      z-index: 1
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--tl);
      margin-bottom: 17px
    }

    .eyebrow::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--tl)
    }

    .hero h1 {
      margin-bottom: 17px
    }

    .hero h1 em {
      font-style: italic;
      color: var(--tl)
    }

    .ctas {
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .pvc {
      background: rgba(253, 250, 245, .9);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 20px;
      box-shadow: var(--sh);
      backdrop-filter: blur(8px)
    }

    .ptop {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px
    }

    .bioq {
      font-size: 13px;
      line-height: 1.7;
      color: var(--mu);
      border-left: 2px solid var(--am);
      padding-left: 11px;
      margin: 11px 0;
      font-style: italic
    }

    .sec {
      max-width: 1060px;
      margin: 0 auto;
      padding: 55px 2rem
    }

    .seclbl {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--tl);
      margin-bottom: 9px
    }

    .how-g {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-top: 34px
    }

    .howi {
      background: var(--wh);
      padding: 25px;
      border: 1px solid var(--bd)
    }

    .howi:first-child {
      border-radius: var(--r) 0 0 var(--r)
    }

    .howi:last-child {
      border-radius: 0 var(--r) var(--r) 0
    }

    .hown {
      font-family: 'Fraunces', serif;
      font-size: 40px;
      font-weight: 300;
      color: var(--bs);
      line-height: 1;
      margin-bottom: 12px
    }

    .lblk {
      background: var(--tl);
      border-radius: var(--rl);
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      margin: 0 2rem 75px
    }

    .lblk h2 {
      color: #fff
    }

    .lblk p {
      color: rgba(255, 255, 255, .7);
      margin-top: 9px;
      font-size: 14px
    }

    .lbdg {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: var(--rl);
      padding: 22px;
      text-align: center
    }

    .ll {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .li {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: 13px;
      color: rgba(255, 255, 255, .8)
    }

    /* ── HUB ── */
    .hub-w {
      max-width: 1060px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .hubt {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.6rem;
      gap: 1rem;
      flex-wrap: wrap
    }

    .fbar {
      display: flex;
      gap: 7px;
      align-items: center;
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 8px 13px;
      font-size: 13px;
      flex-shrink: 0;
      flex-wrap: wrap
    }

    .fval {
      font-weight: 500;
      color: var(--tl);
      background: var(--tll);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(10, 94, 71, .15)
    }

    .hub-g {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(258px, 1fr));
      gap: 13px
    }

    .pc {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 17px;
      box-shadow: var(--sh);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s
    }

    .pc:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(26, 23, 20, .1)
    }

    .pct {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px
    }

    .pcbio {
      font-size: 13px;
      line-height: 1.6;
      color: var(--mu);
      margin: 8px 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .pcch {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px
    }

    .pcc {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--mu);
      border: 1px solid var(--bd)
    }

    /* ── PROFIL ── */
    .pw {
      max-width: 840px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .bk {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--mu);
      cursor: pointer;
      margin-bottom: 20px
    }

    .bk:hover {
      color: var(--tx)
    }

    .ph {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 25px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 20px;
      align-items: start;
      margin-bottom: 13px;
      box-shadow: var(--sh)
    }

    .psec {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 23px;
      margin-bottom: 12px;
      box-shadow: var(--sh)
    }

    .slbl {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--tl);
      margin-bottom: 12px
    }

    .biot {
      font-size: 14px;
      line-height: 1.85;
      color: var(--tx);
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap
    }

    .biot p {
      margin-bottom: 10px
    }

    .biot p:last-child {
      margin-bottom: 0
    }

    .sk-g {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 9px
    }

    .ski {
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 10px 12px;
      background: var(--bg)
    }

    .sknm {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px
    }

    .sklv {
      font-size: 11px;
      color: var(--mu)
    }

    .skbar {
      height: 3px;
      background: var(--bd);
      border-radius: 2px;
      margin-top: 6px
    }

    .skf {
      height: 100%;
      border-radius: 2px;
      background: var(--tm)
    }

    .gapr {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bd)
    }

    .gapr:last-child {
      border-bottom: none;
      padding-bottom: 0
    }

    .gapic {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0
    }

    .pcta {
      background: var(--tl);
      border-radius: var(--rl);
      padding: 20px 23px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      box-shadow: var(--sh);
      flex-wrap: wrap
    }

    .ctxt h4 {
      color: #fff;
      margin-bottom: 2px;
      font-size: 16px
    }

    .ctxt p {
      color: rgba(255, 255, 255, .7);
      font-size: 13px
    }

    .bwh {
      background: #fff;
      color: var(--tl);
      padding: 10px 20px;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      flex-shrink: 0
    }

    /* ── VISIO ── */
    .visw {
      max-width: 1130px;
      margin: 0 auto;
      padding: 3.5rem 2rem 2rem;
      display: grid;
      grid-template-columns: 1fr 305px;
      gap: 15px;
      align-items: start
    }

    .liveb {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #FDE8E8;
      color: #9B1C1C;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 20px
    }

    .ld {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #E02424;
      animation: blink 1.2s infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .vida {
      background: #1A1714;
      border-radius: var(--rl) var(--rl) 0 0;
      aspect-ratio: 16/9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px
    }

    .vp {
      background: #2A2520;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .vp:first-child {
      border-radius: var(--rl) 0 0 0
    }

    .vp:last-child {
      border-radius: 0 var(--rl) 0 0
    }

    .vav {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      overflow: hidden
    }

    .vl {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, .55);
      color: #fff;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px
    }

    .vl.r {
      left: auto;
      right: 8px
    }

    .vlng {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, .45);
      color: rgba(255, 255, 255, .8);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px
    }

    .vlng.l {
      right: auto;
      left: 8px
    }

    .trbar {
      background: #1A1714;
      border-radius: 0 0 var(--rl) var(--rl);
      padding: 11px 15px
    }

    .trhd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px
    }

    .trtt {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .4)
    }

    .sublg {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, .4);
      margin-bottom: 2px
    }

    .subt {
      font-size: 13px;
      color: rgba(255, 255, 255, .85);
      line-height: 1.5
    }

    .subt.tr {
      color: #9FE1CB
    }

    .vctr {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 11px
    }

    .vc {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--wh);
      border: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer
    }

    .vc.end {
      background: #E02424;
      border-color: #E02424
    }

    .vc svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5
    }

    .vc.end svg {
      stroke: #fff
    }

    .gcard {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      overflow: hidden;
      box-shadow: var(--sh)
    }

    .ghd {
      background: var(--tl);
      padding: 13px 15px
    }

    .ghd h4 {
      color: #fff;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500
    }

    .ghd p {
      color: rgba(255, 255, 255, .6);
      font-size: 11px;
      margin-top: 2px
    }

    .gsl {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--mu);
      padding: 9px 14px 3px;
      display: block
    }

    .git {
      padding: 9px 14px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      border-bottom: 1px solid var(--bd);
      cursor: pointer;
      transition: background .1s
    }

    .git:hover {
      background: var(--bg)
    }

    .git:last-child {
      border-bottom: none
    }

    .gck {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 1.5px solid var(--bs);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      transition: all .15s
    }

    .gck.on {
      background: var(--tl);
      border-color: var(--tl);
      color: #fff
    }

    .gtxt {
      font-size: 12px;
      line-height: 1.5
    }

    .gsub {
      font-size: 11px;
      color: var(--mu);
      margin-top: 1px
    }

    .gft {
      padding: 11px 14px;
      border-top: 1px solid var(--bd)
    }

    .prw {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 5px
    }

    .pbar {
      height: 4px;
      background: var(--bd);
      border-radius: 2px
    }

    .pfill {
      height: 100%;
      border-radius: 2px;
      background: var(--tm);
      transition: width .3s
    }

    .lrdy {
      display: none;
      align-items: center;
      gap: 7px;
      background: #E6F4E6;
      border: 1px solid rgba(30, 107, 30, .15);
      border-radius: var(--r);
      padding: 9px 11px;
      margin-top: 9px
    }

    /* ── DASHBOARD ── */
    .dw {
      max-width: 1040px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .stg {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 11px;
      margin-bottom: 1.6rem
    }

    .stc {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 15px;
      box-shadow: var(--sh)
    }

    .stv {
      font-family: 'Fraunces', serif;
      font-size: 30px;
      font-weight: 300;
      line-height: 1
    }

    .stl {
      font-size: 12px;
      color: var(--mu);
      margin-top: 3px
    }

    .d2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
      margin-bottom: 13px
    }

    .dstt {
      font-size: 12px;
      font-weight: 500;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 10px
    }

    .arow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bd)
    }

    .arow:last-child {
      border-bottom: none;
      padding-bottom: 0
    }

    .anm {
      font-size: 13px;
      font-weight: 500
    }

    .asb {
      font-size: 11px;
      color: var(--mu)
    }

    .tl-list {
      display: flex;
      flex-direction: column
    }

    .tli {
      display: flex;
      gap: 12px;
      padding-bottom: 13px;
      position: relative
    }

    .tli::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 18px;
      bottom: 0;
      width: 1px;
      background: var(--bd)
    }

    .tli:last-child::before {
      display: none
    }

    .tld {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid var(--bd);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      z-index: 1
    }

    .tld.dn {
      background: var(--tl);
      border-color: var(--tl);
      color: #fff
    }

    .tld.ac {
      background: var(--wh);
      border-color: var(--tl)
    }

    .tlt {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 1px
    }

    .tlsb {
      font-size: 11px;
      color: var(--mu)
    }

    .empty {
      text-align: center;
      padding: 26px 14px;
      color: var(--mu);
      font-size: 14px
    }

    .emico {
      font-size: 28px;
      margin-bottom: 7px
    }

    /* ── CREATE ── */
    .cw {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .fsteps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 22px
    }

    .fst {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--mu)
    }

    .fst.on {
      color: var(--tl);
      font-weight: 500
    }

    .fst span {
      width: 21px;
      height: 21px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1.5px solid var(--bs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0
    }

    .fst.on span {
      background: var(--tl);
      border-color: var(--tl);
      color: #fff
    }

    .fline {
      flex: 1;
      height: 1px;
      background: var(--bd);
      margin: 0 5px
    }

    /* ── AVATAR SIZES ── */
    .avs {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0
    }

    .avm {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0
    }

    .avl {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0
    }

    /* ── CANDIDATURES ── */
    .cand-w {
      max-width: 1060px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .cand-g {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px
    }

    .cand-c {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 20px;
      box-shadow: var(--sh)
    }

    .cand-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 13px
    }

    .label-seal {
      background: var(--tl);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px
    }

    /* ── COMMUNAUTÉ ── */
    .comm-w {
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .comm-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap
    }

    .ctab {
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--bd);
      background: var(--wh);
      color: var(--mu);
      cursor: pointer;
      transition: all .15s
    }

    .ctab.on {
      background: var(--tl);
      color: #fff;
      border-color: var(--tl)
    }

    .post-c {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: var(--sh)
    }

    .post-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px
    }

    .post-author {
      display: flex;
      align-items: center;
      gap: 9px
    }

    .post-av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0
    }

    .post-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 5px
    }

    .post-body {
      font-size: 13px;
      color: var(--mu);
      line-height: 1.65
    }

    .post-foot {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 11px;
      padding-top: 10px;
      border-top: 1px solid var(--bd)
    }

    .post-tag {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 500
    }

    .tag-bon {
      background: var(--aml);
      color: var(--am)
    }

    .tag-don {
      background: var(--tll);
      color: var(--tl)
    }

    .tag-coup {
      background: var(--pul);
      color: var(--pu)
    }

    .compose-box {
      background: var(--wh);
      border: 1.5px dashed var(--bs);
      border-radius: var(--rl);
      padding: 16px;
      margin-bottom: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--mu);
      font-size: 13px;
      transition: border-color .15s
    }

    .compose-box:hover {
      border-color: var(--tl);
      color: var(--tl)
    }

    /* ── ENTRÉE PAIRÉ ── */
    .ep-w {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .ep-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px
    }

    .ep-opt {
      border: 2px solid var(--bd);
      border-radius: var(--rl);
      padding: 20px;
      cursor: pointer;
      transition: all .15s;
      text-align: center
    }

    .ep-opt:hover,
    .ep-opt.sel {
      border-color: var(--tl);
      background: var(--tll)
    }

    .ep-opt-ic {
      font-size: 30px;
      margin-bottom: 10px
    }

    .ep-opt-nm {
      font-size: 14px;
      font-weight: 500;
      color: var(--tx);
      margin-bottom: 4px
    }

    .ep-opt-sb {
      font-size: 12px;
      color: var(--mu);
      line-height: 1.5
    }

    /* ── MESSAGERIE ── */
    .msg-w {
      max-width: 1000px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      align-items: start;
      min-height: calc(100vh - 100px)
    }

    .conv-list {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      overflow: hidden;
      box-shadow: var(--sh)
    }

    .conv-hd {
      padding: 14px 16px;
      border-bottom: 1px solid var(--bd);
      font-size: 13px;
      font-weight: 500
    }

    .conv-item {
      padding: 13px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      cursor: pointer;
      border-bottom: 1px solid var(--bd);
      transition: background .1s
    }

    .conv-item:hover {
      background: var(--bg)
    }

    .conv-item.active {
      background: var(--tll)
    }

    .conv-item:last-child {
      border-bottom: none
    }

    .conv-av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg2);
      flex-shrink: 0;
      overflow: hidden
    }

    .conv-nm {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px
    }

    .conv-pre {
      font-size: 12px;
      color: var(--mu);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px
    }

    .conv-time {
      font-size: 11px;
      color: var(--mu);
      white-space: nowrap
    }

    .conv-unread {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--tl);
      flex-shrink: 0;
      margin-top: 4px
    }

    .chat-area {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      display: flex;
      flex-direction: column;
      box-shadow: var(--sh);
      overflow: hidden
    }

    .chat-hd {
      padding: 14px 18px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      gap: 12px
    }

    .chat-hd-nm {
      font-size: 14px;
      font-weight: 500
    }

    .chat-hd-sub {
      font-size: 12px;
      color: var(--mu)
    }

    .chat-msgs {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 340px;
      max-height: 420px
    }

    .msg-row {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      max-width: 78%
    }

    .msg-row.me {
      flex-direction: row-reverse;
      align-self: flex-end
    }

    .msg-av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg2);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500
    }

    .msg-bubble {
      padding: 10px 13px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word
    }

    .msg-bubble.them {
      background: var(--bg2);
      color: var(--tx);
      border-bottom-left-radius: 4px
    }

    .msg-bubble.me {
      background: var(--tl);
      color: #fff;
      border-bottom-right-radius: 4px
    }

    .msg-time {
      font-size: 10px;
      color: var(--mu);
      margin-top: 3px;
      text-align: right
    }

    .chat-input-row {
      padding: 13px 16px;
      border-top: 1px solid var(--bd);
      display: flex;
      gap: 9px;
      align-items: flex-end
    }

    .chat-input {
      flex: 1;
      padding: 9px 13px;
      border: 1.5px solid var(--bs);
      border-radius: 20px;
      font-size: 13px;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      line-height: 1.5;
      background: var(--wh)
    }

    .chat-send {
      background: var(--tl);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s
    }

    .chat-send:hover {
      background: #0A4D3A
    }

    /* ── NOTIFICATION BELL ── */
    .notif-btn {
      position: relative;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: var(--mu)
    }

    .notif-dot {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--re);
      border: 1.5px solid var(--wh)
    }

    /* ── PAIRÉ DASHBOARD ── */
    .status-card {
      border-radius: var(--rl);
      padding: 22px;
      margin-bottom: 14px
    }

    .status-step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--bd)
    }

    .status-step:last-child {
      border-bottom: none;
      padding-bottom: 0
    }

    .ss-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      font-weight: 500
    }

    .ss-dot.done {
      background: var(--tl);
      color: #fff
    }

    .ss-dot.active {
      background: var(--aml);
      color: var(--am);
      border: 2px solid var(--am)
    }

    .ss-dot.todo {
      background: var(--bg2);
      color: var(--mu);
      border: 2px solid var(--bd)
    }

    .ss-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px
    }

    .ss-sub {
      font-size: 12px;
      color: var(--mu);
      line-height: 1.5
    }

    /* ── CERTIFICAT ── */
    .cert-w {
      max-width: 700px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .cert-doc {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 0;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(26, 23, 20, .12)
    }

    .cert-header {
      background: var(--tl);
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .cert-logo {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -.3px
    }

    .cert-body {
      padding: 36px 40px
    }

    .cert-seal {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .12);
      border: 2px solid rgba(255, 255, 255, .3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0
    }

    .cert-field {
      margin-bottom: 18px
    }

    .cert-field label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--mu);
      display: block;
      margin-bottom: 4px
    }

    .cert-field .val {
      font-size: 16px;
      font-weight: 500;
      color: var(--tx);
      font-family: 'Fraunces', serif
    }

    .cert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 22px 0;
      padding: 20px;
      background: var(--bg);
      border-radius: var(--r)
    }

    .cert-sk {
      font-size: 13px;
      color: var(--tx);
      margin-bottom: 4px
    }

    .cert-footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--bd)
    }

    .cert-sign {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 300;
      font-style: italic;
      color: var(--tl)
    }

    .cert-date {
      font-size: 12px;
      color: var(--mu)
    }

    @media print {

      #demo-bar,
      .nav,
      .cert-actions {
        display: none !important
      }

      .cert-doc {
        box-shadow: none;
        border: none
      }

      .screen {
        min-height: auto
      }
    }

    /* ── PARAMÈTRES ── */
    .set-w {
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .set-sec {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 22px;
      margin-bottom: 14px;
      box-shadow: var(--sh)
    }

    .set-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--bd)
    }

    .set-row:last-child {
      border-bottom: none;
      padding-bottom: 0
    }

    .set-lbl {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px
    }

    .set-sub {
      font-size: 12px;
      color: var(--mu)
    }

    .toggle {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: var(--bg2);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background .2s;
      flex-shrink: 0
    }

    .toggle::after {
      content: '';
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .2)
    }

    .toggle.on {
      background: var(--tl)
    }

    .toggle.on::after {
      transform: translateX(18px)
    }

    .danger-zone {
      background: var(--rel);
      border: 1px solid rgba(192, 57, 43, .15);
      border-radius: var(--rl);
      padding: 18px 22px;
      margin-bottom: 14px
    }

    /* ── CONVENTION DE STAGE ── */
    .stage-w {
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem
    }

    .ft-header {
      background: linear-gradient(135deg, #003F8A, #0060C7);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: var(--rl) var(--rl) 0 0
    }

    .ft-logo-block {
      display: flex;
      align-items: center;
      gap: 14px
    }

    .ft-logo-icon {
      width: 52px;
      height: 52px;
      background: rgba(255, 255, 255, .15);
      border: 2px solid rgba(255, 255, 255, .3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px
    }

    .ft-logo-txt {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      line-height: 1.2
    }

    .ft-logo-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, .6);
      margin-top: 2px;
      letter-spacing: .04em
    }

    .ft-badge {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: 8px;
      padding: 10px 16px;
      text-align: center
    }

    .ft-badge-num {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      line-height: 1
    }

    .ft-badge-lbl {
      font-size: 10px;
      color: rgba(255, 255, 255, .6);
      margin-top: 2px;
      letter-spacing: .04em;
      text-transform: uppercase
    }

    .conv-body {
      background: var(--wh);
      padding: 36px 40px;
      border: 1px solid var(--bd);
      border-top: none;
      border-radius: 0 0 var(--rl) var(--rl)
    }

    .conv-section {
      margin-bottom: 26px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--bd)
    }

    .conv-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0
    }

    .conv-section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #003F8A;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .conv-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0, 63, 138, .15)
    }

    .conv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .conv-field label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--mu);
      display: block;
      margin-bottom: 3px
    }

    .conv-field .val {
      font-size: 14px;
      font-weight: 500;
      color: var(--tx);
      border-bottom: 1.5px solid var(--bd);
      padding-bottom: 4px
    }

    .conv-skill-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 0;
      border-bottom: 1px solid var(--bd)
    }

    .conv-skill-row:last-child {
      border-bottom: none
    }

    .conv-skill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #003F8A;
      flex-shrink: 0
    }

    .conv-sign-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1.5px solid var(--bd)
    }

    .conv-sign-box {
      text-align: center
    }

    .conv-sign-line {
      height: 48px;
      border-bottom: 1.5px solid var(--tx);
      margin-bottom: 6px
    }

    .conv-sign-name {
      font-size: 12px;
      color: var(--mu)
    }

    .conv-sign-role {
      font-size: 10px;
      color: var(--mu);
      opacity: .7;
      margin-top: 1px
    }

    .duration-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 8px
    }

    .dur-opt {
      border: 2px solid var(--bd);
      border-radius: var(--r);
      padding: 11px;
      cursor: pointer;
      text-align: center;
      transition: all .15s
    }

    .dur-opt:hover,
    .dur-opt.sel {
      border-color: #003F8A;
      background: rgba(0, 63, 138, .05)
    }

    .dur-opt-val {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 300;
      color: #003F8A;
      line-height: 1
    }

    .dur-opt-lbl {
      font-size: 11px;
      color: var(--mu);
      margin-top: 2px
    }

    @media(max-width:768px) {
      .ft-header {
        flex-direction: column;
        gap: 12px;
        padding: 22px 20px
      }

      .conv-body {
        padding: 24px 18px
      }

      .conv-grid {
        grid-template-columns: 1fr
      }

      .conv-sign-row {
        grid-template-columns: 1fr
      }
    }

    /* ── FOOTER ── */
    footer {
      background: #1A1714;
      margin-top: 4rem
    }

    .footer-main {
      max-width: 1060px;
      margin: 0 auto;
      padding: 48px 2rem 36px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 3rem
    }

    .footer-brand .fl {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 20px;
      color: #fff;
      letter-spacing: -.3px;
      margin-bottom: 10px
    }

    .footer-brand .fl span {
      color: var(--tm)
    }

    .footer-brand p {
      font-size: 13px;
      color: rgba(255, 255, 255, .45);
      line-height: 1.65;
      max-width: 220px
    }

    .footer-col h5 {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .35);
      margin-bottom: 12px
    }

    .footer-col a {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, .55);
      text-decoration: none;
      margin-bottom: 7px;
      transition: color .15s;
      cursor: pointer
    }

    .footer-col a:hover {
      color: #fff
    }

    .footer-bottom {
      border-top: 1px solid rgba(255, 255, 255, .08);
      padding: 16px 2rem;
      max-width: 1060px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px
    }

    .footer-bottom p {
      font-size: 12px;
      color: rgba(255, 255, 255, .3)
    }

    .footer-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, .3)
    }

    /* ── TEMOIGNAGES ── */
    .testi-g {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 32px
    }

    .testi-c {
      background: var(--wh);
      border: 1px solid var(--bd);
      border-radius: var(--rl);
      padding: 22px;
      box-shadow: var(--sh)
    }

    .testi-q {
      font-size: 14px;
      line-height: 1.75;
      color: var(--tx);
      font-style: italic;
      margin-bottom: 14px
    }

    .testi-q::before {
      content: '\201C';
      font-family: 'Fraunces', serif;
      font-size: 32px;
      color: var(--tl);
      line-height: 1;
      display: block;
      margin-bottom: 4px
    }

    .testi-au {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .testi-av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden
    }

    .testi-nm {
      font-size: 13px;
      font-weight: 500
    }

    .testi-role {
      font-size: 11px;
      color: var(--mu);
      margin-top: 1px
    }

    /* ── STATS SECTION ── */
    .stats-section {
      background: var(--tl);
      padding: 48px 2rem;
      margin: 0
    }

    .stats-inner {
      max-width: 1060px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      text-align: center
    }

    .stat-num {
      font-family: 'Fraunces', serif;
      font-size: 42px;
      font-weight: 300;
      color: #fff;
      line-height: 1;
      margin-bottom: 6px
    }

    .stat-lbl2 {
      font-size: 13px;
      color: rgba(255, 255, 255, .65)
    }

    /* ── PARTNERS ── */
    .partners-g {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 34px
    }

    .partner-logo {
      height: 46px;
      background: var(--wh);
      border-radius: 23px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Fraunces', serif;
      color: var(--mu);
      border: 1.5px solid var(--bd);
      box-shadow: 0 4px 12px rgba(26, 23, 20, .04);
      transition: all .3s ease;
      cursor: default
    }

    .partner-logo:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26, 23, 20, .12);
      color: var(--tl);
      border-color: var(--tl);
      background: #fff
    }

    .partner-logo.plus {
      background: rgba(29, 158, 117, .1);
      color: var(--tl);
      border-color: rgba(29, 158, 117, .3);
      border-style: dashed
    }

    .partner-logo.plus:hover {
      background: var(--tl);
      color: #fff;
      border-style: solid
    }

    /* ── NOTIF PANEL ITEMS ── */
    .ni {
      padding: 12px 16px;
      border-bottom: 1px solid var(--bd);
      cursor: pointer;
      transition: background .1s;
      display: flex;
      gap: 10px;
      align-items: flex-start
    }

    .ni:hover {
      background: var(--bg)
    }

    .ni:last-child {
      border-bottom: none
    }

    .ni-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--tl);
      flex-shrink: 0;
      margin-top: 4px
    }

    .ni-txt {
      font-size: 13px;
      line-height: 1.5
    }

    .ni-time {
      font-size: 11px;
      color: var(--mu);
      margin-top: 2px
    }

    /* ── ASSO REVEAL BANNER ── */
    .asso-reveal {
      background: linear-gradient(135deg, #0A5E47, #1D9E75);
      border-radius: var(--r);
      padding: 11px 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(10, 94, 71, .3);
    }

    .asso-reveal-ic {
      font-size: 18px
    }

    .asso-reveal-txt {
      font-size: 13px;
      color: #fff;
      font-weight: 500
    }

    .asso-reveal-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, .7)
    }

    /* ══════════════════════════════════════
   RESPONSIVE — TABLETTE (≤ 1024px)
══════════════════════════════════════ */
    @media (max-width:1024px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 2rem
      }

      .pvc {
        max-width: 420px
      }

      .how-g {
        grid-template-columns: 1fr
      }

      .howi:first-child {
        border-radius: var(--r) var(--r) 0 0
      }

      .howi:last-child {
        border-radius: 0 0 var(--r) var(--r)
      }

      .lblk {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin: 0 1rem 50px
      }

      .visw {
        grid-template-columns: 1fr
      }

      .gcard {
        display: none
      }

      /* masque le panneau lateral visio */
      .footer-main {
        grid-template-columns: 1fr 1fr;
        gap: 2rem
      }

      .stats-inner {
        grid-template-columns: repeat(2, 1fr)
      }

      .testi-g {
        grid-template-columns: 1fr 1fr
      }

      .cert-grid {
        grid-template-columns: 1fr
      }
    }

    /* ══════════════════════════════════════
   HAMBURGER NAV (≤ 1080px)
══════════════════════════════════════ */
    @media (max-width:1080px) {

      /* Cache les liens desktop et les boutons texte du nav-r, montre le hamburger */
      .nav-links {
        display: none
      }

      /* Sur mobile : on cache le nom et les boutons connexion dans la nav (ils passent dans mob-menu) */
      .nav-r>span,
      .nav-r>.bo,
      .nav-r>.bp {
        display: none !important
      }

      /* Le nav-r reste visible avec notif + avatar + burger pour les connectés */
      .nav-r {
        display: flex;
        align-items: center;
        gap: 8px
      }

      #ham-btn {
        display: flex
      }

      /* Menu mobile déroulant */
      #mob-menu {
        display: none;
        position: fixed;
        top: calc(var(--dbar)+60px);
        left: 0;
        right: 0;
        background: var(--wh);
        border-bottom: 1px solid var(--bd);
        box-shadow: 0 8px 24px rgba(26, 23, 20, .12);
        z-index: 199;
        padding: 10px;
      }

      #mob-menu.open {
        display: block
      }

      #mob-menu button {
        display: block;
        width: 100%;
        text-align: left;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 500;
        color: var(--tx);
        background: none;
        border: none;
        cursor: pointer;
        border-radius: var(--r);
        transition: background .1s;
      }

      #mob-menu button:hover,
      #mob-menu button.on {
        background: var(--tll);
        color: var(--tl)
      }

      #mob-menu .mob-divider {
        height: 1px;
        background: var(--bd);
        margin: 6px 0
      }

      .nav {
        padding: 0 1rem;
        overflow: hidden
      }
    }

    /* ══════════════════════════════════════
   RESPONSIVE — MOBILE (≤ 768px)
══════════════════════════════════════ */
    @media (max-width:768px) {
      :root {
        --dbar: 78px
      }

      /* ── DEMO BAR mobile : 2 lignes séparées ── */
      #demo-bar {
        flex-direction: column;
        justify-content: center;
        align-items: stretch;
        padding: 0;
        gap: 0;
        height: var(--dbar);
        overflow: hidden;
      }

      .demo-roles {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 5px;
        padding: 4px 10px;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        flex-shrink: 0;
        border-bottom: 1px solid rgba(255, 255, 255, .08);
        height: 39px;
      }

      .demo-roles::-webkit-scrollbar {
        display: none
      }

      .demo-roles span {
        flex-shrink: 0;
        display: inline-block;
        font-size: 10px;
        color: rgba(255, 255, 255, .4)
      }

      .demo-deleg {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px 10px;
        height: 39px;
      }

      .demo-deleg .db-btn {
        width: 100%;
        text-align: center;
        max-width: 300px
      }

      .db-btn {
        font-size: 11px;
        padding: 4px 10px;
        min-height: 28px;
        white-space: nowrap;
        flex-shrink: 0;
        touch-action: manipulation
      }

      /* ── HERO ── */
      .hero {
        padding: 40px 1.2rem 36px;
        grid-template-columns: 1fr
      }

      .pvc {
        max-width: 100%
      }

      .ctas {
        flex-direction: column
      }

      .ctas .bp,
      .ctas .bo {
        width: 100%;
        text-align: center
      }

      /* ── SECTIONS ── */
      .sec {
        padding: 36px 1.2rem
      }

      .how-g {
        grid-template-columns: 1fr
      }

      .howi:first-child {
        border-radius: var(--r) var(--r) 0 0
      }

      .howi:last-child {
        border-radius: 0 0 var(--r) var(--r)
      }

      .lblk {
        padding: 24px;
        margin: 0 0 40px;
        grid-template-columns: 1fr;
        gap: 1.2rem
      }

      /* ── GRILLES GÉNÉRAL ── */
      .fr {
        grid-template-columns: 1fr
      }

      .d2 {
        grid-template-columns: 1fr
      }

      .ep-split {
        grid-template-columns: 1fr
      }

      .role-g {
        grid-template-columns: 1fr
      }

      .hub-g {
        grid-template-columns: 1fr
      }

      .cand-g {
        grid-template-columns: 1fr
      }

      .sk-g {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr))
      }

      .stg {
        grid-template-columns: repeat(2, 1fr)
      }

      /* ── PAGES INTERNES — paddings ── */
      .hub-w,
      .pw,
      .dw,
      .cw,
      .cand-w,
      .comm-w,
      .ep-w,
      .cert-w,
      .set-w {
        padding: 1.5rem 1rem 2rem
      }

      /* ── PROFIL ── */
      .ph {
        grid-template-columns: 1fr;
        gap: 14px
      }

      .pcta {
        flex-direction: column;
        gap: 12px
      }

      .pcta .bwh {
        width: 100%;
        text-align: center
      }

      /* ── MESSAGERIE ── */
      .msg-w {
        grid-template-columns: 1fr;
        gap: 0;
        padding: 0
      }

      .conv-list {
        border-radius: 0;
        border-left: none;
        border-right: none
      }

      .chat-area {
        border-radius: 0;
        min-height: 60vh
      }

      .chat-msgs {
        min-height: 250px;
        max-height: 55vh
      }

      /* ── VISIO ── */
      .visw {
        grid-template-columns: 1fr;
        padding: 1rem
      }

      .vida {
        grid-template-columns: 1fr;
        aspect-ratio: auto
      }

      .vp {
        aspect-ratio: 16/9
      }

      .vp:first-child {
        border-radius: var(--r) var(--r) 0 0
      }

      .vp:last-child {
        border-radius: 0
      }

      /* ── CERTIFICAT ── */
      .cert-header {
        flex-direction: column;
        gap: 12px;
        padding: 22px 20px
      }

      .cert-body {
        padding: 24px 20px
      }

      .cert-grid {
        grid-template-columns: 1fr
      }

      .cert-footer-row {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start
      }

      /* ── STATS ── */
      .stats-inner {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.2rem
      }

      /* ── TÉMOIGNAGES ── */
      .testi-g {
        grid-template-columns: 1fr
      }

      /* ── FOOTER ── */
      .footer-main {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 36px 1.2rem 24px
      }

      .footer-bottom {
        flex-direction: column;
        text-align: center;

        return;

      document.querySelectorAll('.screen').forEach(function (x) { x.classList.remove('active'); });
      document.getElementById('s-' + s).classList.add('active');
      cur = s; if (pid) profId = pid;
      navRender();

      if (R[s]) R[s]();
      // Scroll fiable sur iOS Safari (requestAnimationFrame + double reset)
      requestAnimationFrame(function () {
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      });
    }

    var pxCanvas = null, pxCtx = null, pxNodes = [], pxMouse = { x: 0, y: 0 }, pxRaf = null;
    function initParallax() {
      var wrap = document.querySelector('.hero-wrap');
      if (!wrap) return;
      pxCanvas = document.getElementById('parallax-canvas');
      if (!pxCanvas) return;
      pxCtx = pxCanvas.getContext('2d');
      resize();
      pxNodes = [];
      var N = 28;
      for (var i = 0; i < N; i++) {
        var isP = Math.random() > 0.45;
        pxNodes.push({
          x: Math.random() * pxCanvas.width,
          y: Math.random() * pxCanvas.height,
          vx: (Math.random() - 0.5) * 0.12,
          vy: (Math.random() - 0.5) * 0.12,
          r: Math.random() * 1.8 + 1,
          color: isP ? 'rgba(29,158,117,' : 'rgba(232,153,58,',
          layer: Math.random() * 0.3 + 0.5
        });
      }
      wrap.addEventListener('mousemove', function (e) {
        var rect = wrap.getBoundingClientRect();
        pxMouse.x = (e.clientX - rect.left - rect.width / 2) * 0.006;
        pxMouse.y = (e.clientY - rect.top - rect.height / 2) * 0.004;
      });
      if (pxRaf) cancelAnimationFrame(pxRaf);
      animParallax();
    }
    function resize() {
      var wrap = document.querySelector('.hero-wrap');
      if (!wrap || !pxCanvas) return;
      pxCanvas.width = wrap.offsetWidth;
      pxCanvas.height = wrap.offsetHeight;
    }
    function animParallax() {
      if (!pxCtx || !pxCanvas) return;
      var W = pxCanvas.width, H = pxCanvas.height;
      pxCtx.clearRect(0, 0, W, H);
      for (var i = 0; i < pxNodes.length; i++) {
        var n = pxNodes[i];
        n.x += n.vx + pxMouse.x * n.layer;
        n.y += n.vy + pxMouse.y * n.layer;
        if (n.x < -20) n.x = W + 20; if (n.x > W + 20) n.x = -20;
        if (n.y < -20) n.y = H + 20; if (n.y > H + 20) n.y = -20;
        for (var j = i + 1; j < pxNodes.length; j++) {
          var m = pxNodes[j];
          var dx = n.x - m.x, dy = n.y - m.y, dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 110) {
            var alpha = (1 - dist / 110) * 0.12;
            pxCtx.beginPath();
            pxCtx.strokeStyle = 'rgba(139,115,85,' + alpha + ')';
            pxCtx.lineWidth = 0.6;
            pxCtx.moveTo(n.x, n.y); pxCtx.lineTo(m.x, m.y); pxCtx.stroke();
          }
        }
      }
      for (var k = 0; k < pxNodes.length; k++) {
        var nd = pxNodes[k];
        pxCtx.beginPath();
        pxCtx.arc(nd.x, nd.y, nd.r, 0, Math.PI * 2);
        pxCtx.fillStyle = nd.color + '0.35)';
        pxCtx.fill();
        pxCtx.beginPath();
        pxCtx.arc(nd.x, nd.y, nd.r * 0.5, 0, Math.PI * 2);
        pxCtx.fillStyle = nd.color + '0.65)';
        pxCtx.fill();
      }
      pxRaf = requestAnimationFrame(animParallax);
    }

    function animateCounters() {
      var els = document.querySelectorAll('[data-target]');
      els.forEach(function (el) {
        var target = parseInt(el.getAttribute('data-target'));
        var start = 0, dur = 1600, step = 16;
        var inc = target / (dur / step);
        var iv = setInterval(function () {
          start += inc;
          if (start >= target) { start = target; clearInterval(iv); }
          el.textContent = Math.floor(start);
        }, step);
      });
    }

      var filtres = profils;
