        var um = u.metier.toLowerCase().trim().replace(/e$/, '');
        filtres = profils.filter(function (p) {
          var pm = p.metier.toLowerCase().trim().replace(/e$/, '');
          return pm === um;
        });
        if (filtres.length === 0) filtres = profils; // fallback si aucun profil dans ce métier
      }

      var cards = filtres.map(function (p) {
        var isMatched = false;
        if (u) {
          for (var i = 0; i < db.appairages.length; i++) {
            if (db.appairages[i].pt_id === u.id && db.appairages[i].pp_id === p.id) { isMatched = true; break; }
          }
        }
        var showReal = isMatched;
        var topName = showReal ? ('<strong>' + p.prenom_c + ' ' + p.nom_c + '</strong> &mdash; ' + p.metier) : p.metier;
        var topSub = p.exp + ' ans &middot; ' + p.secteur + (showReal ? ' &middot; <em>' + p.pays + '</em>' : '');
        var badgeHtml = '';
        if (showReal && isMatched) { badgeHtml = '<span class="badge bg" style="margin-bottom:8px">&#10003; Pair&#233; &mdash; identit&#233; r&#233;v&#233;l&#233;e</span><br>'; }
        else if (p.status === 'appaire' && !isMatched) { badgeHtml = '<span class="badge ba" style="margin-bottom:8px">En cours d\'appairage</span><br>'; }
        else { badgeHtml = '<span class="badge bp2" style="margin-bottom:8px">&#9677; Identit&#233; masqu&#233;e</span><br>'; }
        var chips = p.comp.slice(0, 3).map(function (c) { return '<span class="pcc">' + c.n + '</span>'; }).join('');
        if (p.comp.length > 3) chips += '<span class="pcc">+' + (p.comp.length - 3) + '</span>';
        var bio = p.bio.split('\n')[0].substring(0, 105) + '&#8230;';
        return '<div class="pc" onclick="go(\'profile\',\'' + p.id + '\')">' +
          '<div class="pct"><div class="avs">' + avSvg(p, 40) + '</div>' +
          '<div><div style="font-size:13px;font-weight:500">' + topName + '</div>' +
          '<div style="font-size:12px;color:var(--mu)">' + topSub + '</div></div></div>' +
          badgeHtml +
          '<div class="pcbio">&ldquo;' + bio + '&rdquo;</div>' +
          '<div class="pcch">' + chips + '</div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between">' +
          '<span style="font-size:12px;color:var(--mu)">' + p.pays + ' &middot; ' + p.exp + ' ans</span>' +
          '<button style="font-size:12px;font-weight:500;padding:6px 13px;border-radius:20px;background:var(--tl);color:#fff;border:none;cursor:pointer" onclick="event.stopPropagation();go(\'profile\',\'' + p.id + '\')">Voir &#8594;</button>' +
          '</div></div>';
      }).join('');

      // Filtre métier (uniquement pour les Pairants connectés)
      var filterSel = '';
      if (u && u.type === 'pairant') {
        var allMetiers = [];
        db.profils.filter(function (p) { return p.status !== 'certifie'; }).forEach(function (p) { if (allMetiers.indexOf(p.metier) < 0) allMetiers.push(p.metier); });
        filterSel = allMetiers.map(function (m) {
          return '<button style="font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--bd);background:' + (m === metier ? 'var(--tl)' : 'var(--bg2)') + ';color:' + (m === metier ? '#fff' : 'var(--mu)') + ';cursor:pointer;font-family:DM Sans,sans-serif" onclick="changeMetier(\'' + m + '\')">' + m + '</button>';
        }).join('');
      }

      var warn = !u ? '<div style="background:var(--aml);border:1px solid rgba(184,114,15,.2);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:14px;display:flex;align-items:center;justify-content:space-between"><span>Connectez-vous pour demander un appairage.</span><button class="bp bsm" onclick="openModal(\'login\')">Se connecter</button></div>' : '';

      var subtitle = u && u.type === 'pairant' ? 'Profils anonymis&#233;s de votre m&#233;tier — s&#233;lection uniquement bas&#233;e sur les comp&#233;tences.' : 'Tous les profils disponibles.';
      document.getElementById('s-hub').innerHTML =
        '<div class="hub-w">' +
        '<div class="hubt"><div><h2>Hub de Pairs</h2><p style="font-size:14px">' + subtitle + '</p></div>' +
        (u && u.type === 'pairant' ? '<div class="fbar"><span style="color:var(--mu);font-size:12px">M&#233;tier filtr&#233; :</span><span class="fval">' + metier + '</span></div>' : '</div>') +
        (u && u.type === 'pairant' ? '</div>' : '') +
        (filterSel ? '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px">' + filterSel + '</div>' : '') +
        warn +
        '<div class="hub-g">' + cards + '</div></div>';
    }
    function changeMetier(m) {
      var u = Auth.me(); if (!u) return;
      var db = DB.get();
      for (var i = 0; i < db.users.length; i++) { if (db.users[i].id === u.id) { db.users[i].metier = m; break; } }
      DB.save(db); u.metier = m; Store.set('fp6_u', u); rHub();
    }

    // ═══════════════════════════════════
    // PROFIL (vue différente selon rôle)
    // ═══════════════════════════════════
    function rProfile() {
      var db = DB.get();
      var p = null;
      for (var i = 0; i < db.profils.length; i++) { if (db.profils[i].id === profId) { p = db.profils[i]; break; } }
      if (!p) { go('hub'); return; }
      var u = Auth.me();
      var myAp = null;
      if (u) { for (var j = 0; j < db.appairages.length; j++) { if (db.appairages[j].pt_id === u.id && db.appairages[j].pp_id === p.id) { myAp = db.appairages[j]; break; } } }
      var isAsso = u && u.type === 'association';
      // Vérifie si c'est le propre profil du Pairé connecté
      var isOwnProfil = u && u.type === 'paire' && u.pp_id === p.id;
      // Vérifie si c'est un profil géré par l'association connectée
      var isMyAssoProfile = isAsso && p.by === u.id;
      // Vérifie si c'est le propre compte Pairant (cas où un Pairant aurait un profil)
      var isOwnAccount = u && u.id === p.by && u.type !== 'association';
      var showReal = isMyAssoProfile || isOwnProfil || !!myAp;

      // Bannière selon vue
      var banner = '';
      if (isOwnProfil) {
        banner = '<div style="background:var(--tll);border:1px solid rgba(10,94,71,.2);border-radius:var(--r);padding:11px 15px;margin-bottom:13px;display:flex;align-items:center;gap:10px">' +
          '<span style="font-size:18px">&#128100;</span>' +
          '<div style="font-size:13px;font-weight:500;color:var(--tl)">C\'est votre profil &#8212; visible de fa&#231;on anonyme dans le Hub</div></div>';
      } else if (isMyAssoProfile) {
        banner = '<div class="asso-reveal">' +
          '<div class="asso-reveal-ic">&#128274;</div>' +
          '<div><div class="asso-reveal-txt">Vue Association &#8212; profil complet r&#233;el visible</div>' +
          '<div class="asso-reveal-sub">Les Pairants ne voient pas le nom jusqu\'&#224; l\'appairage mutuel.</div></div></div>';
      } else if (isAsso) {
        // Association consulte un profil qu'elle ne gère pas
        banner = '<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:11px 15px;margin-bottom:13px;display:flex;align-items:center;gap:10px">' +
          '<span style="font-size:18px">&#128274;</span>' +
          '<div style="font-size:13px;color:var(--mu)">Ce profil est g&#233;r&#233; par une autre association partenaire.</div></div>';
      } else if (myAp) {
        banner = '<div style="background:var(--tll);border:1px solid rgba(10,94,71,.15);border-radius:var(--r);padding:10px 14px;margin-bottom:13px;display:flex;align-items:center;gap:8px">' +
          '<span style="color:var(--tl);font-size:14px">&#10003;</span>' +
          '<div style="font-size:13px;font-weight:500;color:var(--tl)">Identit&#233; r&#233;v&#233;l&#233;e &#8212; vous &#234;tes pair&#233;s avec ' + p.prenom_c + '</div></div>';
      }

      var headerName = showReal ? ('<div style="font-size:21px;font-weight:500;margin-bottom:3px">' + p.prenom_c + ' ' + p.nom_c + '</div>') :
        ('<div style="font-size:21px;font-weight:500;margin-bottom:3px">' + p.metier + '</div>');
      var anonBadge = !showReal ? ('<span class="badge bp2" style="margin-bottom:9px">&#9677; Profil anonymis&#233; &#8212; identit&#233; r&#233;v&#233;l&#233;e apr&#232;s appairage mutuel</span>') : '';

      var tags = p.langues.map(function (l) { return '<span class="chip" style="background:var(--tll);color:var(--tl);border-color:rgba(10,94,71,.15)">' + l + '</span>'; }).join('');
      var sks = p.comp.map(function (c) { return '<div class="ski"><div class="sknm">' + c.n + '</div><div class="sklv">' + c.lv + ' &middot; ' + c.a + ' ans</div><div class="skbar"><div class="skf" style="width:' + c.p + '%"></div></div></div>'; }).join('');
      var gaps = p.ecarts.map(function (e) {
        return '<div class="gapr"><div class="gapic" style="background:' + (e.t === 'warn' ? 'var(--aml)' : 'var(--tll)') + '">' +
          (e.t === 'warn' ? '&#9888;' : '&#8505;') + '</div><div><div style="font-size:13px;font-weight:500;margin-bottom:2px">' + e.ti + '</div><div style="font-size:12px;color:var(--mu);line-height:1.5">' + e.d + '</div></div></div>';
      }).join('');
      var bioPars = p.bio.split('\n\n').map(function (par) { return '<p>' + par + '</p>'; }).join('');

      var ctaHtml = '';
      if (isOwnProfil) {
        // Pairé sur son propre profil : aucun bouton d'appairage
        ctaHtml = '';
      } else if (!u) {
        ctaHtml = '<div class="pcta"><div class="ctxt"><h4>Connectez-vous pour appairage</h4><p>Cr&#233;ez un compte Pairant pour demander l\'appairage.</p></div><button class="bwh" onclick="openModal(\'register\')">S\'inscrire &#8594;</button></div>';
      } else if (isMyAssoProfile) {
        // Association sur son propre profil géré
        ctaHtml = '<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">' +
          '<div><div style="font-size:14px;font-weight:500;margin-bottom:2px">Ce profil est g&#233;r&#233; par votre association</div><div style="font-size:13px;color:var(--mu)">Statut : <strong>' + ({ en_attente: 'En attente d\'appairage', appaire: 'En cours d\'appairage', certifie: 'Labellis&#233;e' }[p.status] || p.status) + '</strong></div></div>' +
          '<div style="display:flex;align-items:center;gap:10px">' +
          (p.status === 'certifie' ? '<span class="badge bg">&#9672; Label d&#233;livr&#233; le ' + p.label_date + '</span>' : '') +
          '<button class="bo bsm" onclick="editProfile(\'' + p.id + '\')">Modifier</button>' +
          '</div></div>';
      } else if (isAsso) {
        // Association sur un profil d'une autre association : lecture seule
        ctaHtml = '';
      } else if (myAp) {
        var dt = new Date(myAp.date_e).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
        ctaHtml = '<div style="background:var(--tll);border:1px solid rgba(10,94,71,.15);border-radius:var(--rl);padding:20px 23px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">' +
          '<div><div style="font-size:15px;font-weight:500;color:var(--tl);margin-bottom:3px">Appairage en cours</div><div style="font-size:13px;color:var(--tl)">Entretien pr&#233;vu le ' + dt + '</div></div>' +
          '<button class="bp bsm" onclick="go(\'entretien\')">Rejoindre l\'entretien</button></div>';
      } else if (p.status === 'appaire') {
        ctaHtml = '<div style="background:var(--aml);border:1px solid rgba(184,114,15,.15);border-radius:var(--rl);padding:20px 23px"><div style="font-size:14px;font-weight:500;color:var(--am)">Ce profil est actuellement en cours d\'appairage avec un autre Pairant.</div></div>';
      } else if (u.type === 'paire') {
        // Un Pairé ne peut pas appairage un autre Pairé
        ctaHtml = '';
      } else {
        ctaHtml = '<div class="pcta"><div class="ctxt"><h4>Appairez-vous avec ce profil</h4><p>Les identit&#233;s seront r&#233;v&#233;l&#233;es une fois les deux parties d\'accord.</p></div><button class="bwh" onclick="reqApp(\'' + p.id + '\')">Demander l\'appairage &#8594;</button></div>';
      }

      document.getElementById('s-profile').innerHTML =
        '<div class="pw">' +
        '<div class="bk" onclick="go(\'hub\')">&larr; Retour au Hub</div>' +
        banner +
        '<div class="ph"><div class="avl">' + avSvg(p, 70) + '</div><div>' +
        anonBadge +
        headerName +
        '<div style="font-size:14px;color:var(--mu);margin-bottom:11px">' + p.exp + ' ans &middot; ' + p.secteur + '</div>' +
        '<div style="display:flex;gap:7px;flex-wrap:wrap">' +
        '<span class="chip" style="background:var(--aml);color:var(--am);border-color:rgba(184,114,15,.15)">' + p.pays + '</span>' + tags +
        '</div></div></div>' +
        '<div class="psec"><div class="slbl">Biographie narrative</div><div class="biot">' + bioPars + '</div></div>' +
        '<div class="psec"><div class="slbl">Comp&#233;tences techniques</div><div class="sk-g">' + sks + '</div></div>' +
        '<div class="psec"><div class="slbl">Points d\'adaptation au contexte fran&#231;ais</div>' + gaps + '</div>' +
        ctaHtml + '</div>';
    }

    function reqApp(ppId) {
      var u = Auth.me(); if (!u) { openModal('login'); return; }
      var db = DB.get();
      var ap = {
        id: 'ap_' + Date.now(), pt_id: u.id, pp_id: ppId, status: 'en_cours', date_d: Date.now(),
        date_e: new Date(Date.now() + 86400000 * 3).toISOString().split('T')[0],
        grille: { lex: false, vocab: false, star1: false, star2: false, ec1: false, ec2: false }, done: false
      };
      for (var i = 0; i < db.profils.length; i++) { if (db.profils[i].id === ppId) { db.profils[i].status = 'appaire'; break; } }
      db.appairages.push(ap); DB.save(db);
      toast('Demande envoy&#233;e ! Vous serez notifi&#233; d&#232;s acceptation.', 'ok');
      rProfile();
    }

    // ═══════════════════════════════════
    // ENTRETIEN
    // ═══════════════════════════════════
    function rEntretien() {
      var db = DB.get(), u = Auth.me();
      var ap = null;
      var isPaire = u && u.type === 'paire';

      if (u) {
        for (var i = 0; i < db.appairages.length; i++) {
          var a = db.appairages[i];
          // Le Pairant trouve son appairage par pt_id, le Pairé par pp_id
          if (isPaire ? (a.pp_id === u.pp_id) : (a.pt_id === u.id)) { ap = a; break; }
        }
      }
      if (!ap) ap = db.appairages[0];
      var pp = null;
      var pt = null;
      if (ap) {
        for (var j = 0; j < db.profils.length; j++) { if (db.profils[j].id === ap.pp_id) { pp = db.profils[j]; break; } }
        for (var k = 0; k < db.users.length; k++) { if (db.users[k].id === ap.pt_id) { pt = db.users[k]; break; } }
      }
      if (!pp) pp = db.profils[0];
      var g = ap ? ap.grille : { lex: true, vocab: true, star1: false, star2: false, ec1: true, ec2: false };
      var done = Object.values(g).filter(Boolean).length;
      var tot = Object.keys(g).length;
      var apId = ap ? ap.id : 'ap1';
      // Noms selon la perspective
      var ptnNm = pt ? (pt.prenom + ' ' + pt.nom) : (u && !isPaire ? u.prenom + ' ' + u.nom : 'Laure Dubois');
      var ppNm = pp ? pp.prenom_c : (isPaire && u ? u.prenom : 'Karim');
      var ppMet = pp ? pp.metier : 'Ingénieur mécanique';
      var ppLang = pp ? (pp.langues[0] || 'AR') : 'Arabe';

      var gDefs = [
        { key: 'lex', sec: '1 &#8212; Lexique &amp; environnement', lbl: 'Outils &amp; logiciels m&#233;tier', sub: 'V&#233;rification maîtrise pratique' },
        { key: 'vocab', sec: null, lbl: 'Vocabulaire technique FR', sub: 'Ma&#238;trise confirm&#233;e' },
        { key: 'star1', sec: '2 &#8212; M&#233;thode STAR', lbl: 'R&#233;solution d\'un probl&#232;me technique', sub: 'R&#233;ponse en cours d\'&#233;valuation' },
        { key: 'star2', sec: null, lbl: 'Gestion d\'&#233;quipe ou de projet', sub: '&#192; aborder' },
        { key: 'ec1', sec: '3 &#8212; &#201;carts normatifs', lbl: '&#201;cart 1 &#8212; identifi&#233;', sub: 'Cf. fiche profil' },
        { key: 'ec2', sec: null, lbl: '&#201;cart 2 &#8212; &#224; &#233;valuer', sub: 'Niveau actuel &#224; d&#233;terminer' }
      ];
      var lastSec = '';
      var gitems = gDefs.map(function (it) {
        var sh = (it.sec && it.sec !== lastSec) ? '<span class="gsl">' + it.sec + '</span>' : '';
        if (it.sec) lastSec = it.sec;
        var checked = g[it.key];
        // Le Pairé voit la grille en lecture seule (il ne coche pas lui-même)
        var clickAttr = isPaire ? '' : 'onclick="tglG(\'' + it.key + '\',\'' + apId + '\')"';
        var itemStyle = isPaire ? 'cursor:default;opacity:' + (checked ? '1' : '0.55') : '';
        return sh + '<div class="git" ' + clickAttr + ' style="' + itemStyle + '">' +
          '<div class="gck' + (checked ? ' on' : '') + '"></div>' +
          '<div><div class="gtxt">' + it.lbl + '</div><div class="gsub">' + it.sub + '</div></div></div>';
      }).join('');

      // Panneau droit : différent selon rôle
      var rightPanel = '';
      if (isPaire) {
        // Pairé : grille lecture seule + explication
        rightPanel =
          '<div class="gcard"><div class="ghd"><h4>Grille d\'entretien</h4><p>' + ppMet + '</p></div>' +
          '<div style="background:var(--tll);border:1px solid rgba(10,94,71,.15);border-radius:var(--r);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--tl)">' +
          '&#9432; Le Pairant coche les crit&#232;res au fil de l\'entretien. Vous pouvez suivre la progression en temps r&#233;el.</div>' +
          '<div id="g-items">' + gitems + '</div>' +
          '<div class="gft">' +
          '<div class="prw"><span style="color:var(--mu)">Progression</span><span id="g-cnt" style="font-weight:500;color:var(--tl)">' + done + ' / ' + tot + '</span></div>' +
          '<div class="pbar"><div class="pfill" id="g-fill" style="width:' + Math.round(done / tot * 100) + '%"></div></div>' +
          '<div class="lrdy" id="g-rdy" style="' + (done === tot ? 'display:flex' : 'display:none') + '">' +
          '<span style="font-size:18px">&#9672;</span><div><div style="font-size:12px;font-weight:500;color:#1E6B1E">Label Faire Pair &#8212; Pr&#234;t</div><div style="font-size:11px;color:#1E6B1E">Tous les crit&#232;res valid&#233;s !</div></div></div>' +
          '</div></div>';
      } else {
        // Pairant : grille interactive avec bouton de validation
        rightPanel =
          '<div class="gcard"><div class="ghd"><h4>Grille d\'entretien</h4><p>' + ppMet + '</p></div>' +
          '<div id="g-items">' + gitems + '</div>' +
          '<div class="gft">' +
          '<div class="prw"><span style="color:var(--mu)">Progression</span><span id="g-cnt" style="font-weight:500;color:var(--tl)">' + done + ' / ' + tot + '</span></div>' +
          '<div class="pbar"><div class="pfill" id="g-fill" style="width:' + Math.round(done / tot * 100) + '%"></div></div>' +
          '<div class="lrdy" id="g-rdy" style="' + (done === tot ? 'display:flex' : 'display:none') + '">' +
          '<span style="font-size:18px">&#9672;</span><div><div style="font-size:12px;font-weight:500;color:#1E6B1E">Label Faire Pair &#8212; Pr&#234;t</div><div style="font-size:11px;color:#1E6B1E">Tous les crit&#232;res valid&#233;s</div></div></div>' +
          '<button class="bp bfull" style="margin-top:10px;font-size:13px" onclick="deliverLabel(\'' + apId + '\',\'' + (pp ? pp.id : '') + '\')">Valider &amp; d&#233;livrer le Label &#8594;</button>' +
          '</div></div>';
      }

      document.getElementById('s-entretien').innerHTML =
        '<div style="max-width:1130px;margin:0 auto;padding:3.5rem 2rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">' +
        '<div><h3 style="margin-bottom:3px">Entretien de validation</h3><p style="font-size:13px">' + ptnNm + ' &#8596; ' + ppNm + ' &#8212; #' + apId.slice(-3) + '</p></div>' +
        '<div style="display:flex;align-items:center;gap:10px"><div class="liveb"><span class="ld"></span>En direct</div>' +
        '<div id="vt" style="font-size:12px;color:var(--mu)">00:00:00</div></div></div>' +
        '<div class="visw">' +
        '<div>' +
        '<div class="vida">' +
        '<div class="vp"><div class="vav"><svg width="54" height="54" viewBox="0 0 54 54"><circle cx="27" cy="27" r="27" fill="#DFF3EC"/><ellipse cx="27" cy="22" rx="10" ry="11" fill="#0A5E47" opacity="0.65"/><ellipse cx="27" cy="44" rx="19" ry="14" fill="#0A5E47" opacity="0.4"/></svg></div><div class="vl">' + ptnNm + ' &#8212; Pairant</div><div class="vlng">FR</div></div>' +

          if (db.profils[i].id === cDat.editId) {

            db.profils[i].nom_c = cDat.nom || '';
            db.profils[i].metier = cDat.metier;
            db.profils[i].exp = cDat.exp;
            db.profils[i].secteur = cDat.secteur;
            db.profils[i].pays = cDat.pays;
            db.profils[i].langues = langues;
            db.profils[i].bio = cDat.bio;
            db.profils[i].comp = cDat.comp || [];
            db.profils[i].ecarts = ecarts;
            break;
          }
        }
        DB.save(db); var eid = cDat.editId; cDat = {}; cStep = 1;
        toast('Profil mis &#224; jour avec succ&#232;s !', 'ok'); go('profile', eid);
        return;
      }
      var cols = ['amber', 'teal', 'purple', 'gray'];
      var col = cols[db.profils.length % cols.length];
      db.profils.push({ id: 'pp_' + Date.now(), by: u.id, prenom_c: cDat.prenom || '', nom_c: cDat.nom || '', metier: cDat.metier, exp: cDat.exp, secteur: cDat.secteur, pays: cDat.pays, langues: langues, bio: cDat.bio, comp: cDat.comp || [], ecarts: ecarts, status: 'en_attente', label_by: null, label_date: null, col: col });
      DB.save(db); cDat = {}; cStep = 1;
      toast('Profil Pair&#233; cr&#233;&#233; et visible dans le Hub !', 'ok'); go('dash');
    }

    var activeCv = 0;
    function rMessagerie() {
      var u = Auth.me();
      var db = DB.get();
      if (!u) { document.getElementById('s-messagerie').innerHTML = '<div style="max-width:500px;margin:80px auto;text-align:center;padding:2rem"><h2>Messages</h2><p style="margin:14px 0 22px">Connectez-vous pour acc&#233;der &#224; votre messagerie.</p><button class="bp" onclick="openModal(\'login\')">Se connecter</button></div>'; return; }
      var convs = db.conversations || [];
      // Sélectionner conversations pertinentes pour l'utilisateur
      var myConvs = convs.filter(function (c) {
        return c.participants && c.participants.indexOf(u.id) > -1;
      });
      if (myConvs.length === 0) {
        document.getElementById('s-messagerie').innerHTML = '<div style="max-width:700px;margin:80px auto;text-align:center;padding:2rem"><h2>Messages</h2><p style="margin:14px 0">Vos conversations avec vos pairs appara&#238;tront ici une fois l\'appairage accept&#233;.</p></div>'; return;
      }
      if (activeCv >= myConvs.length) activeCv = 0;
      var cv = myConvs[activeCv];
      // Noms des participants
      var cvNames = {
        'cv1': { short: 'Laure / Karim', detail: 'Laure Dubois &#8596; Karim Al-Rashid &middot; Ing&#233;nieur m&#233;canique', last: '&#192; jeudi !', unread: true },
        'cv2': { short: 'Laure / Aminata', detail: 'Laure Dubois &#8596; Aminata Diallo &middot; Infirmi&#232;re', last: '...et pour la reconnaissance ?', unread: true }
      };
      var convList = myConvs.map(function (c, i) {
        var nm = cvNames[c.id] || { short: 'Conversation ' + (i + 1), detail: '', last: '', unread: false };

          '<span style="font-size:20px;flex-shrink:0">&#9888;&#65039;</span>' +
          '<div>' +
          '<div style="font-size:13px;font-weight:600;color:#7A4A00;margin-bottom:6px">&#201;ligibilit&#233; limit&#233;e &#8212; v&#233;rification obligatoire</div>' +
          '<div style="font-size:12px;color:#5C3800;line-height:1.75">' +
          'Tous les profil&#233;s ne sont <strong>pas automatiquement &#233;ligibles</strong> &#224; une convention PMSMP. ' +
          'En tant que Pairant, il vous revient de v&#233;rifier avec votre Pair&#233; :<br>' +
          '<span style="display:inline-block;margin-top:5px"><strong>&#10003; Statut de s&#233;jour</strong> &#8212; Le b&#233;n&#233;ficiaire doit avoir le droit de travailler en France ' +
          '(statut r&#233;fugi&#233;, protection subsidiaire ou titre de s&#233;jour autorisant le travail). ' +
          'Les personnes en cours de demande d\'asile ne sont <u>pas &#233;ligibles</u> pendant les 6 premiers mois.</span><br>' +
          '<span style="display:inline-block;margin-top:4px"><strong>&#10003; Inscription &#224; France Travail</strong> &#8212; La personne doit &#234;tre inscrite comme demandeur d\'emploi, ' +
          'ou suivie par un prescripteur habilit&#233; (Mission Locale, Cap Emploi&#8230;)</span>' +
          '</div>' +
          '<div style="margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.6);border-radius:var(--r);font-size:11px;color:#5C3800">' +
          '&#128196; En cas de doute, rapprochez-vous de l\'agence France Travail de r&#233;f&#233;rence avant de signer la convention.' +
          '</div>' +
          '</div></div></div>' +
          // Note durée longue
          (parseInt(stageDuree) > 4 ?
            '<div style="background:rgba(0,63,138,.07);border:1px solid rgba(0,63,138,.25);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;font-size:12px;color:#003F8A;display:flex;gap:8px;align-items:flex-start">' +
            '<span style="font-size:14px;flex-shrink:0">&#8505;</span>' +
            '<div><strong>Dur&#233;e de ' + stageDuree + ' semaines :</strong> la dur&#233;e l&#233;gale maximale d\'une convention PMSMP est <strong>1 mois (4 semaines)</strong> par prescription. ' +
            'Au-del&#224;, un <strong>renouvellement de convention</strong> est n&#233;cessaire (1 fois possible, soit 8 semaines max au total). ' +
            'Cette maquette g&#233;n&#233;rera le document de premi&#232;re convention &#8212; le renouvellement devra &#234;tre &#233;tabli s&#233;par&#233;ment avec France Travail.</div>' +
            '</div>' : '') +
          // Note PMSMP dispositif
          '<div style="background:rgba(0,63,138,.05);border:1px solid rgba(0,63,138,.18);border-radius:var(--r);padding:13px 16px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start">' +
          '<span style="font-size:18px;flex-shrink:0">&#8505;</span>' +
          '<div><div style="font-size:13px;font-weight:500;color:#003F8A;margin-bottom:3px">Dispositif PMSMP &#8212; P&#233;riode de Mise en Situation en Milieu Professionnel</div>' +
          '<div style="font-size:12px;color:var(--mu);line-height:1.6">Ce stage d\'immersion ne cr&#233;e pas de contrat de travail. Le stagiaire conserve ses allocations et est couvert par l\'assurance de France Travail (AT/MP). La convention est tripartite : Pairant, Pair&#233;, France Travail &#8212; Art. L. 5135-1 du Code du travail.</div></div>' +
          '</div>' +
          '<div style="display:flex;gap:10px">' +
          '<button class="bo" onclick="go(\'dash\')">Annuler</button>' +
          (deleg ?
            '<button class="bp" onclick="stageStep=2;stageObj=document.getElementById(\'st-obj\').value;stageDateDeb=document.getElementById(\'st-deb\').value;rStage()">G&#233;n&#233;rer la convention &rarr;</button>' :
            '<button class="bp" onclick="stageStep=3;rStage()">Transmettre la demande de PMSMP &rarr;</button>') +
          '</div></div>';
      } else if (stageStep === 3) {
        document.getElementById('s-stage').innerHTML =
          '<div class="stage-w" style="max-width:600px;margin:80px auto;text-align:center">' +
          '<div style="font-size:48px;margin-bottom:16px">&#9989;</div>' +
          '<h2 style="margin-bottom:12px">Demande transmise avec succ&#232;s</h2>' +
          '<p style="font-size:14px;color:var(--mu);line-height:1.7;margin-bottom:24px">' +
          'L\'association partenaire n\'ayant pas de d&#233;l&#233;gation de prescription, votre demande de PMSMP a &#233;t&#233; transmise &#224; l\'organisme comp&#233;tent (France Travail / Mission Locale).<br><br>' +
          '<strong>Rappel important :</strong> Vous ne pouvez pas accueillir le b&#233;n&#233;ficiaire avant d\'avoir re&#231;u et sign&#233; la convention officielle valid&#233;e par le prescripteur. Vous serez recontact&#233; sous 48h.</p>' +
          '<button class="bp" onclick="go(\'dash\')">Retour &#224; mon espace</button>' +
          '</div>';
      } else {
        // Afficher la convention générée
        document.getElementById('s-stage').innerHTML = rConvention(draft);
        // Auto-scroll to doc
        setTimeout(function () { var d = document.getElementById('conv-doc'); if (d) d.scrollIntoView({ behavior: 'smooth' }); }, 80);
      }
    }

    function rConvention(draft) {
      var u = Auth.me();
      var db = DB.get();
      var pp = null; for (var i = 0; i < db.profils.length; i++) { if (db.profils[i].id === draft.pp_id) { pp = db.profils[i]; break; } }
      var today = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
      var ref = 'FT-PMSMP-' + new Date().getFullYear() + '-' + (draft.pp_id || 'PP').toUpperCase().slice(-4);
      // Calcul date fin
      var dateDeb = stageDateDeb ? new Date(stageDateDeb) : new Date(Date.now() + 7 * 86400000);
      var dateFin = new Date(dateDeb.getTime() + parseInt(stageDuree || '2') * 7 * 86400000);
      var fmtDate = function (d) { return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' }); };
      var objLines = (stageObj || draft.obj || '').split('\n').filter(Boolean);
      var objHtml = objLines.map(function (l) {
        return '<div class="conv-skill-row"><div class="conv-skill-dot"></div><div style="font-size:13px">' + l + '</div></div>';
      }).join('');
      var sksHtml = pp ? pp.comp.slice(0, 4).map(function (c) {
        return '<div class="conv-skill-row"><div class="conv-skill-dot"></div>' +
          '<div><div style="font-size:13px;font-weight:500">' + c.n + '</div><div style="font-size:11px;color:var(--mu)">' + c.lv + ' &middot; ' + c.a + ' ans d\'exp&#233;rience</div></div></div>';
      }).join('') : '';
      return '<div class="stage-w">' +
        '<div class="bk" onclick="stageStep=1;rStage()">&larr; Modifier</div>' +
        '<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap" class="cert-actions">' +
        '<button class="bp bsm" onclick="window.print()">&#128424; T&#233;l&#233;charger / Imprimer</button>' +
        '<button class="bo bsm" onclick="toast(\'Lien copi&#233; !\',\'ok\')">&#128279; Partager</button>' +
        '<button class="bo bsm" onclick="go(\'dash\')">&#10003; Finaliser &amp; enregistrer</button>' +
        '</div>' +
        '<div id="conv-doc">' +
        // En-tête France Travail
        '<div class="ft-header">' +
        '<div class="ft-logo-block">' +
        '<div class="ft-logo-icon">&#127981;</div>' +
        '<div><div class="ft-logo-txt">France Travail</div><div class="ft-logo-sub">Direction R&#233;gionale &Icirc;le-de-France</div></div>' +
        '</div>' +
        '<div class="ft-badge"><div class="ft-badge-num">PMSMP</div><div class="ft-badge-lbl">P&#233;riode d\'Immersion</div></div>' +
        '</div>' +
        // Corps du document
        '<div class="conv-body">' +
        '<div style="text-align:center;margin-bottom:28px;padding-bottom:22px;border-bottom:1.5px solid var(--bd)">' +
        '<div style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#003F8A;margin-bottom:10px">Convention de P&#233;riode de Mise en Situation en Milieu Professionnel</div>' +
        '<h2 style="font-size:24px;margin-bottom:6px;color:var(--tx)">Convention tripartite d\'immersion professionnelle</h2>' +
        '<div style="font-size:13px;color:var(--mu)">&#201;tablie en application de l\'article L. 5135-1 du Code du travail</div>' +
        '<div style="margin-top:10px;display:inline-flex;align-items:center;gap:8px;background:rgba(0,63,138,.07);border:1px solid rgba(0,63,138,.2);border-radius:20px;padding:5px 14px;font-size:12px;color:#003F8A;font-weight:500">' +
        'R&#233;f. ' + ref + ' &middot; &#201;tablie le ' + today + '</div></div>' +
        // Parties
        '<div class="conv-section">' +
        '<div class="conv-section-title">Parties signataires</div>' +
        '<div class="conv-grid">' +
        '<div class="conv-field"><label>Structure d\'accueil (Pairant / Tuteur)</label>' +
        '<div class="val">' + draft.pt_nm + '</div>' +
        '<div style="font-size:12px;color:var(--mu);margin-top:3px">' + draft.pt_co + '</div></div>' +
        '<div class="conv-field"><label>Personne en immersion (Pair&#233;)</label>' +
        '<div class="val">' + draft.pp_nm + '</div>' +
        '<div style="font-size:12px;color:var(--mu);margin-top:3px">' + draft.pp_met + '</div></div>' +
        '</div>' +
        '<div style="margin-top:14px;background:rgba(0,63,138,.05);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:9px">' +
        '<span style="font-size:16px">&#127981;</span>' +
        '<div style="font-size:12px;color:#003F8A"><strong>France Travail</strong> &mdash; Organisme prescripteur et garant. Conseiller r&#233;f&#233;rent : Agence Faire Pair Paris Centre</div>' +
        '</div></div>' +
        // Période
        '<div class="conv-section">' +
        '<div class="conv-section-title">P&#233;riode de la convention</div>' +
        '<div class="conv-grid">' +
        '<div class="conv-field"><label>Date de d&#233;but</label><div class="val">' + fmtDate(dateDeb) + '</div></div>' +
        '<div class="conv-field"><label>Date de fin</label><div class="val">' + fmtDate(dateFin) + '</div></div>' +
        '<div class="conv-field"><label>Dur&#233;e</label><div class="val">' + stageDuree + ' semaine' + (parseInt(stageDuree) > 1 ? 's' : '') + '</div></div>' +
        '<div class="conv-field"><label>Volume horaire hebdomadaire</label><div class="val">35 heures</div></div>' +
        '</div></div>' +
        // Objectifs pédagogiques
        '<div class="conv-section">' +
        '<div class="conv-section-title">Objectifs p&#233;dagogiques</div>' +
        '<div style="font-size:12px;color:var(--mu);margin-bottom:12px">Comp&#233;tences &#224; observer, pratiquer et &#233;valuer au cours de l\'immersion</div>' +
        (objHtml || sksHtml) +
        '</div>' +
        // Compétences validées Label
        (pp && pp.comp.length > 0 ? '<div class="conv-section">' +
          '<div class="conv-section-title">Comp&#233;tences valid&#233;es &mdash; Label Faire Pair</div>' +
          '<div style="font-size:12px;color:var(--mu);margin-bottom:12px">Certifi&#233;es par un pair professionnel du m&#234;me secteur avant ce stage</div>' +
          sksHtml + '</div>' : '') +
        // Conditions
        '<div class="conv-section">' +
        '<div class="conv-section-title">Conditions et engagements</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
        '<div style="background:var(--bg);border-radius:var(--r);padding:12px"><div style="font-size:11px;font-weight:600;color:#003F8A;margin-bottom:7px">STRUCTURE D\'ACCUEIL s\'engage &#224;</div>' +
        '<div style="font-size:12px;color:var(--mu);line-height:1.8">&#10003; Accueillir dans des conditions de travail normales<br>&#10003; D&#233;signer un tuteur identifi&#233;<br>&#10003; Fournir les &#201;quipements de Protection Individuelle<br>&#10003; Respecter la confidentialit&#233; des informations</div></div>' +
        '<div style="background:var(--bg);border-radius:var(--r);padding:12px"><div style="font-size:11px;font-weight:600;color:#003F8A;margin-bottom:7px">PERSONNE EN IMMERSION s\'engage &#224;</div>' +
        '<div style="font-size:12px;color:var(--mu);line-height:1.8">&#10003; Respecter le r&#232;glement int&#233;rieur<br>&#10003; Respecter la confidentialit&#233; des informations<br>&#10003; Informer en cas d\'absence<br>&#10003; R&#233;aliser un bilan en fin de stage</div></div>' +
        '</div>' +
        '<div style="margin-top:12px;background:rgba(0,63,138,.05);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--mu)">' +
        '&#9432; La personne en immersion <strong>n\'est pas salari&#233;e</strong> de la structure d\'accueil. Elle b&#233;n&#233;ficie de la couverture assurance de France Travail pendant toute la dur&#233;e de la convention (AT/MP inclus).' +
        '</div></div>' +
        // Signatures
        '<div class="conv-sign-row">' +
        '<div class="conv-sign-box"><div class="conv-sign-line"></div><div class="conv-sign-name">' + draft.pt_nm + '</div><div class="conv-sign-role">Tuteur de stage &mdash; ' + draft.pt_co + '</div></div>' +
        '<div class="conv-sign-box"><div class="conv-sign-line"></div><div class="conv-sign-name">' + draft.pp_nm + '</div><div class="conv-sign-role">Personne en immersion</div></div>' +
        '<div class="conv-sign-box">' +
        (Store.get('fp6_deleg') ?
          '<div class="conv-sign-line" style="border-bottom-color:#003F8A"></div><div class="conv-sign-name" style="color:#003F8A;font-weight:500">France Terre d\'Asile</div><div class="conv-sign-role">Prescripteur (par d&#233;l&#233;gation de l\'&#201;tat)</div>' :
          '<div class="conv-sign-line" style="border-bottom-color:#003F8A"></div><div class="conv-sign-name" style="color:#003F8A;font-weight:500">France Travail</div><div class="conv-sign-role">Conseiller r&#233;f&#233;rent prescripteur</div>'
        ) +
        '</div>' +
        '</div>' +
        // Pied de page
        '<div class="conv-ft-footer">' +
        '<div style="display:flex;align-items:center;gap:7px"><span style="font-size:16px">&#127981;</span><span style="font-size:11px;color:var(--mu)">France Travail &mdash; Dispositif PMSMP &mdash; Art. L. 5135-1 Code du travail</span></div>' +
        '<div style="font-size:11px;color:var(--mu)">Faire Pair &middot; fairepair.fr &middot; ' + today + '</div>' +
        '</div>' +
        '</div></div></div>';
    }


    // ═══════════════════════════════════
    // INITIALISATION
    // ═══════════════════════════════════
    go('home');

  </script>
</body>

</html>
